services:
  neo4j:
    image: neo4j:5.26-community
    container_name: anime-ontology-neo4j
    ports:
      # 호스트에 이미 다른 Neo4j(7474/7687)가 떠 있을 수 있어, 이 프로젝트 전용으로
      # 포트를 다르게 매핑한다.
      - "7475:7474" # 브라우저 콘솔
      - "7688:7687" # Bolt
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:?NEO4J_PASSWORD를 .env에 설정하세요}"
    volumes:
      - ./.neo4j/data:/data
    restart: unless-stopped
